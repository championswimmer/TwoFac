name: Library Unit Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'sharedLib/src/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'sharedLib/src/**'
  workflow_dispatch: # For manual triggering

jobs:
  detect-apple-changes:
    runs-on: ubuntu-latest
    outputs:
      apple_changed: ${{ steps.filter.outputs.apple }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect Apple-specific changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            apple:
              - 'iosApp/**'
              - '**/src/iosMain/**'
              - '**/src/iosTest/**'
              - '**/src/macosMain/**'
              - '**/src/macosTest/**'
              - '**/src/watchosMain/**'
              - '**/src/watchosTest/**'
              - '**/*.xcodeproj/**'
              - '**/*.xcworkspace/**'
              - '**/*.xcconfig'
              - '**/*.swift'
              - '**/*.plist'
              - '**/*.entitlements'
              - 'sharedLib/build.gradle.kts'
              - 'composeApp/build.gradle.kts'
              - 'cliApp/build.gradle.kts'
              - '.github/workflows/lib-unit-tests.yml'

  test-windows:
    name: "Run mingwX64 tests on Windows"
    runs-on: windows-latest
    needs: test-ubuntu # Windows tests are costly. Run them only if Linux tests pass.
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Windows Tests
        run: ./gradlew :sharedLib:mingwX64Test

  test-macos:
    name: "Run [mac + ios] tests on macOS"
    runs-on: macos-latest
    needs: [test-ubuntu, detect-apple-changes] # MacOS tests are costly. Run them only if Linux tests pass and Apple-specific files changed.
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-apple-changes.outputs.apple_changed == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run macOS and iOS Tests
        run: |
          ./gradlew :sharedLib:macosArm64Test
          ./gradlew :sharedLib:iosSimulatorArm64Test

  test-ubuntu:
    name: "Run [jvm, web, linux] tests on Ubuntu"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Check ABI Compatibility
        run: ./gradlew :sharedLib:checkLegacyAbi

      - name: Run Linux and JVM Tests
        run: |
          ./gradlew :sharedLib:linuxX64Test
          ./gradlew :sharedLib:jvmTest
          ./gradlew :sharedLib:wasmJsNodeTest
