name: CLI App Run

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.agents/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.agents/**'
  workflow_dispatch: # For manual triggering

jobs:
  detect-apple-changes:
    runs-on: ubuntu-latest
    outputs:
      apple_changed: ${{ steps.filter.outputs.apple }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect Apple-specific changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            apple:
              - 'iosApp/**'
              - '**/src/iosMain/**'
              - '**/src/iosTest/**'
              - '**/src/macosMain/**'
              - '**/src/macosTest/**'
              - '**/src/watchosMain/**'
              - '**/src/watchosTest/**'
              - '**/*.xcodeproj/**'
              - '**/*.xcworkspace/**'
              - '**/*.xcconfig'
              - '**/*.swift'
              - '**/*.plist'
              - '**/*.entitlements'
              - 'sharedLib/build.gradle.kts'
              - 'composeApp/build.gradle.kts'
              - 'cliApp/build.gradle.kts'
              - '.github/workflows/cli-app-run.yml'

  run-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Windows CLI App
        run: ./gradlew :cliApp:runDebugExecutableMingwX64 -PrunArgs="--help -v"

  run-cli-macos:
    needs: detect-apple-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-apple-changes.outputs.apple_changed == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run macOS CLI App
        run: ./gradlew :cliApp:runDebugExecutableMacosArm64 -PrunArgs="--help -v"

  run-cli-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run Linux CLI App
        run: ./gradlew :cliApp:runDebugExecutableLinuxX64 -PrunArgs="--help -v"
