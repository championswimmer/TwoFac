name: Deploy PWA to GitHub Pages

on:
  push:
    tags:
      - '*'
permissions:
  contents: write

jobs:
  deploy:
    name: "Build and Deploy Web PWA to GitHub Pages"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Web PWA
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Generate Service Worker with Workbox
        working-directory: composeApp
        run: npx workbox-cli generateSW workbox-config-for-wasm.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: composeApp/build/dist/wasmJs/productionExecutable/
          cname: web.twofac.app
