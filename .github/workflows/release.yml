name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-ubuntu:
    name: "Build Android, Linux Desktop, Web, CLI (Linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Build Linux Desktop (Deb)
        run: ./gradlew :composeApp:packageDeb

      - name: Build Web Distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Build CLI (Linux x64)
        run: ./gradlew :cliApp:linkReleaseExecutableLinuxX64

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/release/*.apk

      - name: Upload Linux Desktop (Deb)
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

      - name: Upload Web Distribution
        uses: actions/upload-artifact@v4
        with:
          name: web-distribution
          path: composeApp/build/dist/wasmJs/productionExecutable/

      - name: Upload CLI (Linux x64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: cliApp/build/bin/linuxX64/releaseExecutable/2fac.kexe

  build-windows:
    name: "Build Windows Desktop and CLI"
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Windows Desktop (MSI)
        run: ./gradlew :composeApp:packageMsi

      - name: Build CLI (Windows)
        run: ./gradlew :cliApp:linkReleaseExecutableMingwX64

      - name: Upload Windows Desktop (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi

      - name: Upload CLI (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: cliApp/build/bin/mingwX64/releaseExecutable/2fac.exe

  build-macos:
    name: "Build macOS Desktop, iOS Framework, CLI (macOS)"
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build macOS Desktop (DMG)
        run: ./gradlew :composeApp:packageDmg

      - name: Build iOS XCFramework
        run: ./gradlew :composeApp:assembleReleaseXCFramework

      - name: Zip iOS XCFramework
        run: |
          cd composeApp/build/XCFrameworks/release
          zip -r ComposeApp.xcframework.zip ComposeApp.xcframework

      - name: Build CLI (macOS arm64)
        run: ./gradlew :cliApp:linkReleaseExecutableMacosArm64

      - name: Build CLI (macOS x64)
        run: ./gradlew :cliApp:linkReleaseExecutableMacosX64

      - name: Upload macOS Desktop (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: composeApp/build/XCFrameworks/release/ComposeApp.xcframework.zip

      - name: Upload CLI (macOS arm64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-arm64
          path: cliApp/build/bin/macosArm64/releaseExecutable/2fac.kexe

      - name: Upload CLI (macOS x64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-x64
          path: cliApp/build/bin/macosX64/releaseExecutable/2fac.kexe

  release:
    name: "Create GitHub Release"
    needs: [build-ubuntu, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Zip Web Distribution
        run: |
          cd artifacts/web-distribution
          zip -r ../web-distribution.zip .
          cd ../..

      - name: Rename CLI binaries to avoid filename conflicts
        run: |
          mv artifacts/cli-linux-x64/2fac.kexe artifacts/cli-linux-x64/2fac-linux-x64
          mv artifacts/cli-macos-arm64/2fac.kexe artifacts/cli-macos-arm64/2fac-macos-arm64
          mv artifacts/cli-macos-x64/2fac.kexe artifacts/cli-macos-x64/2fac-macos-x64
          mv artifacts/cli-windows-x64/2fac.exe artifacts/cli-windows-x64/2fac-windows-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/linux-desktop-deb/*.deb
            artifacts/web-distribution.zip
            artifacts/cli-linux-x64/2fac-linux-x64
            artifacts/windows-desktop-msi/*.msi
            artifacts/cli-windows-x64/2fac-windows-x64.exe
            artifacts/macos-desktop-dmg/*.dmg
            artifacts/ios-xcframework/ComposeApp.xcframework.zip
            artifacts/cli-macos-arm64/2fac-macos-arm64
            artifacts/cli-macos-x64/2fac-macos-x64
