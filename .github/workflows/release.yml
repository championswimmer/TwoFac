name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
  IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
  IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
  IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

jobs:
  build-ubuntu:
    name: "Build Android, Linux Desktop, Web PWA + Extensions, CLI (Linux)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Android APK
        run: ./gradlew :androidApp:assembleRelease

      - name: Build Linux Desktop (Deb)
        run: ./gradlew :composeApp:packageDeb

      - name: Build Web PWA + Browser Extensions
        run: ./gradlew :composeApp:packageBrowserExtensions

      - name: Build CLI (Linux x64)
        run: ./gradlew :cliApp:linkReleaseExecutableLinuxX64

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/release/*.apk

      - name: Upload Linux Desktop (Deb)
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

      - name: Upload Web PWA Distribution
        uses: actions/upload-artifact@v4
        with:
          name: web-pwa-distribution
          path: composeApp/build/dist/wasmJs/productionExecutable/

      - name: Upload Chrome Extension
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: composeApp/build/extension/dist/twofac-chrome-extension-*.zip

      - name: Upload Firefox Extension
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: composeApp/build/extension/dist/twofac-firefox-extension-*.zip

      - name: Upload CLI (Linux x64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: cliApp/build/bin/linuxX64/releaseExecutable/2fac.kexe

      - name: Upload release build logs (Ubuntu) on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs-ubuntu
          if-no-files-found: ignore
          path: |
            build/reports/problems/**
            composeApp/build/compose/logs/**
            composeApp/build/compose/tmp/*.args.txt

  build-windows:
    name: "Build Windows Desktop and CLI"
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup WiX
        run: choco install wixtoolset

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build CLI (Windows)
        run: .\gradlew.bat :cliApp:linkReleaseExecutableMingwX64

      - name: Upload CLI (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: cliApp/build/bin/mingwX64/releaseExecutable/2fac.exe

      - name: Build Windows Desktop (MSI)
        run: .\gradlew.bat :composeApp:packageMsi

      - name: Upload Windows Desktop (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-msi
          path: composeApp/build/compose/binaries/main/msi/*.msi

      - name: Upload release build logs (Windows) on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs-windows
          if-no-files-found: ignore
          path: |
            build/reports/problems/**
            composeApp/build/compose/logs/**
            composeApp/build/compose/tmp/*.args.txt

  build-macos:
    name: "Build macOS Desktop, iOS Framework and App, CLI (macOS)"
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build CLI (macOS arm64)
        run: ./gradlew :cliApp:linkReleaseExecutableMacosArm64

      - name: Build CLI (macOS x64)
        run: ./gradlew :cliApp:linkReleaseExecutableMacosX64

      - name: Upload CLI (macOS arm64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-arm64
          path: cliApp/build/bin/macosArm64/releaseExecutable/2fac.kexe

      - name: Upload CLI (macOS x64)
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-x64
          path: cliApp/build/bin/macosX64/releaseExecutable/2fac.kexe

      - name: Build macOS Desktop (DMG)
        run: ./gradlew :composeApp:packageDmg

      - name: Upload macOS Desktop (DMG)
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg


      - name: Build iOS frameworks (arm64, simulator)
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 :composeApp:linkReleaseFrameworkIosSimulatorArm64

      - name: Create and zip iOS XCFramework
        run: |
          mkdir -p composeApp/build/XCFrameworks/release
          xcodebuild -create-xcframework \
            -framework composeApp/build/bin/iosArm64/releaseFramework/TwoFacUIKit.framework \
            -framework composeApp/build/bin/iosSimulatorArm64/releaseFramework/TwoFacUIKit.framework \
            -output composeApp/build/XCFrameworks/release/TwoFacUIKit.xcframework
          cd composeApp/build/XCFrameworks/release
          zip -r TwoFacUIKit.xcframework.zip TwoFacUIKit.xcframework

      - name: Import signing certificate
        if: ${{ env.IOS_SIGNING_CERTIFICATE_P12_BASE64 != '' }}
        env:
          CERTIFICATE_P12: ${{ env.IOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ env.IOS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Import provisioning profile
        if: ${{ env.IOS_PROVISION_PROFILE_BASE64 != '' }}
        env:
          PROVISION_PROFILE: ${{ env.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISION_PROFILE" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive iOS app
        if: ${{ env.IOS_TEAM_ID != '' }}
        env:
          TEAM_ID: ${{ env.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/TwoFac.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export iOS IPA (ad-hoc)
        if: ${{ env.IOS_TEAM_ID != '' }}
        env:
          TEAM_ID: ${{ env.IOS_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/TwoFac.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/ipa"

      - name: Upload iOS XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: composeApp/build/XCFrameworks/release/TwoFacUIKit.xcframework.zip

      - name: Upload iOS IPA
        if: ${{ env.IOS_TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa/*.ipa

      - name: Upload release build logs (macOS) on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: release-build-logs-macos
          if-no-files-found: ignore
          path: |
            build/reports/problems/**
            composeApp/build/compose/logs/**
            composeApp/build/compose/tmp/*.args.txt

  release:
    name: "Create GitHub Release"
    needs: [ build-ubuntu, build-windows, build-macos ]
    if: always() && (needs.build-ubuntu.result == 'success' || needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts/

      - name: Zip Web PWA Distribution
        continue-on-error: true
        run: |
          cd artifacts/web-pwa-distribution
          zip -r ../web-pwa-distribution.zip .
          cd ../..

      - name: Package *nix CLI binaries as tar.gz to preserve executable bit
        continue-on-error: true
        run: |
          if [ -d "artifacts/cli-linux-x64" ]; then
            tar -czf artifacts/2fac-linux-x64.tar.gz -C artifacts/cli-linux-x64 2fac.kexe
          fi
          if [ -d "artifacts/cli-macos-arm64" ]; then
            tar -czf artifacts/2fac-macos-arm64.tar.gz -C artifacts/cli-macos-arm64 2fac.kexe
          fi
          if [ -d "artifacts/cli-macos-x64" ]; then
            tar -czf artifacts/2fac-macos-x64.tar.gz -C artifacts/cli-macos-x64 2fac.kexe
          fi
          if [ -d "artifacts/cli-windows-x64" ]; then
            mv artifacts/cli-windows-x64/2fac.exe artifacts/2fac-windows-x64.exe
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/android-apk/*.apk
            artifacts/linux-desktop-deb/*.deb
            artifacts/web-pwa-distribution.zip
            artifacts/chrome-extension/*.zip
            artifacts/firefox-extension/*.zip
            artifacts/2fac-linux-x64.tar.gz
            artifacts/windows-desktop-msi/*.msi
            artifacts/2fac-windows-x64.exe
            artifacts/macos-desktop-dmg/*.dmg
            artifacts/ios-xcframework/TwoFacUIKit.xcframework.zip
            artifacts/ios-ipa/*.ipa
            artifacts/2fac-macos-arm64.tar.gz
            artifacts/2fac-macos-x64.tar.gz
