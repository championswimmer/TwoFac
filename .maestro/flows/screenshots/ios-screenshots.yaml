appId: tech.arnav.twofac.app
---
# Launch the app fresh (clear all state and keychain)
- launchApp:
    clearState: true
    clearKeychain: true

# Dismiss any iOS system dialogs (e.g., Apple Account Verification)
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"

# Step 1: Lock screen — capture before entering passkey
- assertVisible: "Enter Passkey"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-01-lock-screen

# Step 2: Enter passkey 123456 and unlock
- tapOn: "Passkey"
- inputText: "123456"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-02-passkey-entered
- tapOn: "Unlock"

# Step 3: Home screen
- assertVisible: "Home"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-03-home-screen

# Step 4a: Accounts screen
- tapOn: "Accounts"
- assertVisible: "Accounts"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-04-accounts-screen

# Step 4b: Settings screen
- tapOn: "Settings"
- assertVisible: "Settings"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-05-settings-screen

# Step 5: Add Account screen (navigate via Accounts tab FAB)
- tapOn: "Accounts"
- assertVisible: "Accounts"
- tapOn: "Add Account"
- assertVisible: "Add Account"
- takeScreenshot: /Users/championswimmer/Development/Personal/Kotlin/TwoFac/docs/screenshots/ios-06-add-account-screen
